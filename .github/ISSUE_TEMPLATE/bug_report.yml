name: Bug report
description: Something doesn't behave the way the docs say it should
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        **For security vulnerabilities, please do NOT use this template.** See [SECURITY.md](../../SECURITY.md) for the private disclosure flow.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior
      placeholder: "When I run `terraform apply`..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal config + commands. Redact account IDs / ARNs.
      placeholder: |
        1. terraform.tfvars contents:
        2. terraform init
        3. terraform apply
      render: bash
    validations:
      required: true

  - type: input
    id: terraform-version
    attributes:
      label: Terraform version
      placeholder: "1.9.5"
    validations:
      required: true

  - type: input
    id: aws-provider-version
    attributes:
      label: AWS provider version
      placeholder: "5.70.0"
    validations:
      required: true

  - type: input
    id: aws-region
    attributes:
      label: AWS region
      placeholder: "us-east-1"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module version / git ref
      placeholder: "v0.1.0 or main@<sha>"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste error output. Redact account IDs, ARNs, and any secret-shaped values.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and didn't find a duplicate
          required: true
        - label: I have redacted account IDs / ARNs / secrets from logs
          required: true
        - label: This is NOT a security vulnerability (those go via SECURITY.md)
          required: true
